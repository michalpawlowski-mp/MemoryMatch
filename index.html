<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="stats">
        <div>Ruchy: <span id="moves">0</span></div>
      </div>
    </header>

    <div class="game-container">
      <div class="grid" id="grid"></div>
    </div>

    <button onclick="resetGame()">Nowa gra</button>

    <div class="win-message" id="winMessage">
      <div>🎉 Świetna robota!</div>
      <div>Ukończyłeś w <span id="finalMoves">0</span> ruchach</div>
      <button type="button" onclick="resetGame()">Zagraj ponownie</button>
    </div>
    <script src="app.js"></script>
  </body>
</html>
